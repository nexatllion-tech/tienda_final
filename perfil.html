<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Mi Perfil
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #111827;
        }

        .container {
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        /* SIDEBAR */

        .sidebar {
            background: white;
            border-radius: 30px;
            padding: 35px;
            height: fit-content;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .06);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #6366f1;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            margin-bottom: 25px;
            font-size: 42px;
            font-weight: bold;
        }

        .username {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .email {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu button {
            border: none;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            background: #f9fafb;
            font-weight: bold;
        }

        /* MAIN */

        .main {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .06);
        }

        .card h2 {
            margin-bottom: 25px;
            font-size: 30px;
        }

        /* FORM */

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-weight: bold;
        }

        .input-group input {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dbe3ee;
            background: #f9fafb;
        }

        .save-btn {
            margin-top: 25px;
            border: none;
            background: #6366f1;
            color: white;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }


        .masFavoritos-btn {
            margin-top: 25px;
            border: none;
            background: #6366f1;
            color: white;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            margin-top: 25px;
            border: none;
            background: #6366f1;
            color: white;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        /* FAVORITOS */

        .favorites-grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .favorite-card {
            background: #f9fafb;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }

        .favorite-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .favorite-card h3 {
            margin-bottom: 10px;
        }

        /* PEDIDOS */

        .orders {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order {
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 25px;
        }

        .message {
            display: none;
            margin-top: 20px;
            padding: 16px;
            border-radius: 14px;
            background: #dcfce7;
            color: #166534;
        }

        @media(max-width:1000px) {

            .profile-layout {
                grid-template-columns: 1fr;
            }

        }

        @media(max-width:700px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
