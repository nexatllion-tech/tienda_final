    <style>
        /* =========================
           RESET
        ========================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #111827;
        }

        /* =========================
           CONTAINER
        ========================= */

        .container {
            max-width: 1300px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .breadcrumb {
            margin-bottom: 30px;
            color: #6b7280;
        }

        /* =========================
           PRODUCTO
        ========================= */

        .product-box {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 700px;
        }

        .left-side {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: #eef2ff;
        }

        .left-side img {
            width: 100%;
            max-width: 420px;
            height: 500px;
            object-fit: contain;
        }

        .right-side {
            padding: 60px;
        }

        .category {
            color: #6366f1;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            margin-bottom: 25px;
        }

        .rating {
            margin-bottom: 25px;
        }

        .description {
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .price {
            font-size: 58px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .actions {
            display: flex;
            gap: 15px;
        }

        button {
            border: none;
            padding: 18px;
            border-radius: 18px;
            cursor: pointer;
        }

        .buy-btn {
            flex: 1;
            background-color: #4f46e5;
            color: #fdfdfd ;
        }

        .fav-btn {
            width: 70px;
        }

        /* =========================
           INFO
        ========================= */

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-card {
            padding: 20px;
            border-radius: 20px;
            background: #f9fafb;
        }

        /* =========================
           RELACIONADOS
        ========================= */

        .related {
            margin-top: 60px;
        }

        .related h2 {
            margin-bottom: 25px;
        }

        .related-grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .related-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
        }

        .related-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        /* =========================
           RESPONSIVE
        ========================= */

        @media(max-width:1000px) {

            .product-box {
                grid-template-columns: 1fr;
            }

        }
    </style>

</head>
