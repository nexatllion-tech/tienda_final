<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Panel Administración
    </title>

    <style>
        /* ===================================
   RESET
=================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #111827;
        }

        /* ===================================
   LAYOUT
=================================== */

        .container {
            max-width: 1500px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ===================================
   HEADER
=================================== */

        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 35px;

        }

        .logo {

            font-size: 38px;

            font-weight: bold;

        }

        .logo span {

            color: #6366f1;

        }

        .add-btn {

            border: none;

            background: #6366f1;

            color: white;

            padding: 16px 24px;

            border-radius: 18px;

            font-weight: bold;

            cursor: pointer;

        }

        /* ===================================
   STATS
=================================== */

        .stats {

            display: grid;

            grid-template-columns:
                repeat(4, 1fr);

            gap: 25px;

            margin-bottom: 35px;

        }

        .stat-card {

            background: white;

            padding: 30px;

            border-radius: 28px;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .05);

        }

        .stat-card h2 {

            font-size: 40px;

            margin-bottom: 10px;

        }

        .stat-card p {

            color: #6b7280;

        }

        /* ===================================
   FILTERS
=================================== */

        .filters {

            background: white;

            border-radius: 28px;

            padding: 25px;

            margin-bottom: 30px;

            display: flex;

            gap: 20px;

        }

        .filters input {

            flex: 1;

            padding: 16px;

            border-radius: 14px;

            border: 1px solid #dbe3ee;

        }

        /* ===================================
   TABLE
=================================== */

        .table-container {

            background: white;

            border-radius: 28px;

            padding: 30px;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .05);

        }

        table {

            width: 100%;

            border-collapse: collapse;

        }

        th {

            text-align: left;

            padding: 20px;

            color: #64748b;

        }

        td {

            padding: 20px;

            border-top: 1px solid #edf2f7;

        }

        .product-image {

            width: 70px;

            height: 70px;

            object-fit: contain;

        }

        .actions {

            display: flex;

            gap: 10px;

        }

        .edit-btn {

            border: none;

            background: #dbeafe;

            color: #1d4ed8;

            padding: 10px 16px;

            border-radius: 12px;

            cursor: pointer;

        }

        .delete-btn {

            border: none;

            background: #fee2e2;

            color: #dc2626;

            padding: 10px 16px;

            border-radius: 12px;

            cursor: pointer;

        }

        /* ===================================
   MODAL
=================================== */

        .modal {

            position: fixed;

            inset: 0;

            background: rgba(0, 0, 0, .5);

            display: none;

            justify-content: center;

            align-items: center;

        }

        .modal-content {

            width: 500px;

            background: white;

            border-radius: 28px;

            padding: 35px;

        }

        .form-group {

            display: flex;

            flex-direction: column;

            gap: 10px;

            margin-bottom: 20px;

        }

        .form-group input {

            padding: 16px;

            border-radius: 14px;

            border: 1px solid #dbe3ee;

        }

        .save-btn {

            width: 100%;

            border: none;

            background: #10b981;

            color: white;

            padding: 16px;

            border-radius: 14px;

            font-weight: bold;

            cursor: pointer;

        }

        /* ===================================
   RESPONSIVE
=================================== */

        @media(max-width:1100px) {

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

        }

        @media(max-width:700px) {

            .stats {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

        }
    </style>

</head>

<body>

        <header class="header">

            <div class="logo">

            </div>

            <button class="add-btn" id="addProductBtn">

            </button>

        </header>

        <!-- ESTADÍSTICAS -->

        <section class="stats">

            <article class="stat-card">
                <h2 id="totalProducts">0</h2>

    </div>

            </h2>

            <form id="productForm">

                </div>

                <div class="form-group">

                </div>

                <div class="form-group">

                    <label>Categoría</label>

                    <input type="text" id="category">

                </div>

                <button class="save-btn" type="submit">
                    Guardar
                </button>

            </form>

        </div>

    </div>
