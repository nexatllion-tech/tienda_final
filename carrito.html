<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --bg: #f1f5f9;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group.full {
            grid-column: 1/3;
        }

        label {
            font-weight: 600;
        }

        input {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .cart-item {
            display: flex;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .cart-item-price {
            color: var(--muted);
        }

        .summary {
            position: sticky;
            top: 30px;
            height: fit-content;
        }

        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #edf2f7;
            font-size: 26px;
            font-weight: 700;
        }

        .buy-btn {
            width: 100%;
            margin-top: 25px;
            border: none;
            background: var(--success);
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            opacity: 0.9;
        }

        @media(max-width:950px) {

            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .summary {
                position: relative;
                top: 0;
            }

        }

        @media(max-width:700px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .input-group.full {
                grid-column: auto;
            }

        }
    </style>
</head>

<body>
    <nav>

        <div class="nav-container">

            <!-- LOGO -->

            <div class="logo">

                <a href="index.html">Mini<span>Shop</span></a>

            </div>


            <!-- BOTONES NAV -->

            <div class="nav-actions">

                <!-- TODO:
        Abrir modal login
        -->

                <button class="cart-btn">

                    Mi cuenta

                </button>
                <button class="logout-btn hidden">
                    ⏼
                </button>
            </div>

        </div>

    </nav>

    <!-- ========================================
  HERO
  ========================================= -->



    <div class="container">

        <h1>Finalizar compra</h1>

        <div class="checkout-layout">

            <!-- FORMULARIO -->

            <section class="card">

                <h2>Datos de envío</h2>

                <form>

                    <div class="form-grid">

                        <div class="input-group">
                            <label>Nombre</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Apellidos</label>
                            <input type="text">
                        </div>

                        <div class="input-group full">
                            <label>Dirección</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Ciudad</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Código postal</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Teléfono</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Email</label>
                            <input type="email">
                        </div>

                    </div>

                </form>

            </section>

            <!-- RESUMEN -->

            <aside class="card summary">

                <h2>Tu carrito</h2>

                <article class="cart-item">

                    <img
                        src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-max-desert">

                    <div class="cart-item-info">

                        <p class="cart-item-title">
                            iPhone 16 Pro Max
                        </p>

                        <p class="cart-item-price">
                            1 x 1399€
                        </p>

                    </div>

                </article>



                <div class="total">
                    <span>Total</span>
                    <span>2696€</span>
                </div>

                <button class="buy-btn">
                    Comprar ahora
                </button>

            </aside>

        </div>

    </div>
    <script src="carrito.js"></script>
</body>

</html>
